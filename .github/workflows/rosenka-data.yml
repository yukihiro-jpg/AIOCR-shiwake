# 路線価マップの索引データ自動更新。
# 毎年7月1日に国税庁が新年度分を公開するため、7月2日に自動実行して
# 「町丁名→図番号」対応表JSONを再生成し main へコミットする（Pagesが自動再デプロイ）。
# 手動実行（workflow_dispatch）も可能。
name: Update rosenka data

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 2 7 *' # 毎年7月2日 12:00 JST
  push:
    branches: [main]
    paths:
      - 'tools/rosenka/**'
      - '.github/workflows/rosenka-data.yml'

permissions:
  contents: write
  actions: write # データコミット後に Pages デプロイを起動するため

concurrency:
  group: rosenka-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 都市計画（用途地域）データの生成: 国土数値情報 A29（茨城県）→ 軽量JSON
      # 失敗しても路線価の更新は継続する（既存の都市計画データは保護される）
      - name: Build toshi-keikaku data (用途地域)
        continue-on-error: true
        run: |
          curl -sS --max-time 120 -o /tmp/a29.zip "https://nlftp.mlit.go.jp/ksj/gml/data/A29/A29-19/A29-19_08_GML.zip"
          mkdir -p /tmp/a29 && (cd /tmp/a29 && unzip -o /tmp/a29.zip >/dev/null)
          echo "== zip 内容 =="
          find /tmp/a29 -type f | sort
          # zipには市町村・都市計画区域ごとに複数のシェープファイルが入っているため全て変換して結合する
          N=0
          mkdir -p /tmp/a29/geojson
          while IFS= read -r SHP; do
            N=$((N+1))
            npx -y mapshaper "$SHP" encoding=shift_jis -o format=geojson precision=0.00001 "/tmp/a29/geojson/part$N.geojson"
          done < <(find /tmp/a29 -iname '*.shp' | sort)
          echo "変換したシェープファイル数: $N"
          if [ "$N" -eq 0 ]; then
            echo "シェープファイルが見つかりません。XMLサンプル:"
            X=$(find /tmp/a29 -iname '*.xml' | head -1)
            [ -n "$X" ] && head -c 2500 "$X"
            exit 1
          fi
          node tools/rosenka/build-toshi-data.mjs --geojson-dir /tmp/a29/geojson --out public/rosenka-data/toshi/ibaraki.json

      - name: Build rosenka index
        run: node tools/rosenka/build-rosenka-index.mjs

      - name: Commit and push index data
        id: commit_index
        run: |
          if [[ -n "$(git status --porcelain public/rosenka-data)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/rosenka-data
            git commit -m "路線価索引データを更新（自動生成）"
            git pull --rebase origin main
            git push
            # GITHUB_TOKEN によるpushは他のワークフローを起動しないため、Pagesデプロイを明示的に起動する
            gh workflow run deploy-pages.yml --ref main
          else
            echo "変更なし（データは最新）"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # 路線価図PDFのミラー（X-Frame-Options対策: raw.githubusercontent.com 経由で画面内表示するため）
      # 専用ブランチ rosenka-pdfs に置き、main のリポジトリサイズには影響させない。
      - name: Mirror rosenka PDFs to rosenka-pdfs branch
        run: |
          set -e
          MIRROR_DIR="${RUNNER_TEMP}/rosenka-pdfs"
          mkdir -p "$MIRROR_DIR"
          cd "$MIRROR_DIR"
          git init -q -b rosenka-pdfs .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git fetch -q --depth=1 origin rosenka-pdfs 2>/dev/null; then
            git checkout -q -B rosenka-pdfs FETCH_HEAD
            echo "既存ミラーを取得（差分ダウンロード）"
          else
            echo "ミラーブランチ新規作成"
            echo "路線価図PDFの自動ミラー（出典: 国税庁 財産評価基準書 https://www.rosenka.nta.go.jp/ ）" > README.md
          fi
          node "${GITHUB_WORKSPACE}/tools/rosenka/mirror-rosenka-pdfs.mjs" \
            --index-dir "${GITHUB_WORKSPACE}/public/rosenka-data/index" --dest .
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -q -m "路線価図PDFミラーを更新（自動生成）"
            git push -q origin rosenka-pdfs
            echo "ミラーをpushしました"
          else
            echo "ミラーは最新"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
